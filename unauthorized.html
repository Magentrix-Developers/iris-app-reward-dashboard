<!DOCTYPE html>
<html lang="">
  <head>
    <meta charset="UTF-8">
    <link rel="icon" href="/favicon.ico">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unauthorized</title>

    <style>
        .container {
            margin-top: 6rem;
        }

        .code {
            text-align: center;
            font-size: 7.6rem;
            font-weight: bold;
        }

        .title {
            text-align: center;
            font-size: 2.1rem;
            font-weight: bold;
        }

        .description {
            text-align: center;
            font-size: 1.12rem;
            color: grey;
            margin-top: 1.1rem;
        }

        .btn-container {
            text-align: center;
            margin-top: 2rem;
        }

        .btn {
            display: inline-block;
            padding: 11px 15px;
            background-color: #3884c7;
            color: white;
            text-decoration: none;
            font-size: 14px;
            border-radius: 8px;
            text-align: center;
            transition: background-color 0.3s ease;
        }

        .btn:hover {
            background-color: #609dd2;
        }
    </style>
  </head>
  <body>
    <div class="container">
        <div class="code">401</div>
        <div class="title">Unauthorized access.</div>
        <div class="description">Sorry, you don't have permission to view this page.</div>
        <div class="btn-container"><a class="btn" href="/">Back to Homepage</a></div>
    </div>
  </body>
</html>
